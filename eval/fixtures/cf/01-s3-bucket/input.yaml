AWSTemplateFormatVersion: "2010-09-09"
Description: Simple versioned S3 bucket with encryption and tags.

Parameters:
  BucketNamePrefix:
    Type: String
    Default: my-app-data
    Description: Prefix used for the globally-unique bucket name.

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${BucketNamePrefix}-${Environment}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  BucketName:
    Value: !Ref DataBucket
    Description: The generated S3 bucket name.
  BucketArn:
    Value: !GetAtt DataBucket.Arn
    Description: The ARN of the S3 bucket.
