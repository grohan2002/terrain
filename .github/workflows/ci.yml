name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm install` rather than `npm ci` because the lockfile contains
      # optional native deps (tree-sitter via swagger-ui-react's YAML parser)
      # whose `resolved`/`integrity` fields are platform-dependent. `npm ci`
      # strict mode rejects the drift; `npm install` reconciles it.
      - run: npm install --no-audit --no-fund

      - run: npx eslint .
        name: Lint

      - run: npx tsc --noEmit
        name: Typecheck

      - run: npm run test:ci
        name: Test

      - run: npm run build
        name: Build
