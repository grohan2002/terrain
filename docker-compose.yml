services:
  app:
    build: .
    # Host port 3001 (container still 3000). Port 3000 is a very common default
    # for other Next.js projects; mapping to 3001 avoids conflicts when running
    # multiple local dev stacks side-by-side.
    ports:
      - "3001:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://bicepui:bicepui@postgres:5432/bicepui
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bicepui
      POSTGRES_PASSWORD: bicepui
      POSTGRES_DB: bicepui
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bicepui"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Host port 6380 (container still 6379) to avoid conflicts with other local
    # projects that may already be using 6379. The app connects to redis via the
    # internal Docker network (redis:6379), so this only affects host access.
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
